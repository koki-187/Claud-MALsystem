name = "mal-search-system"
main = "src/index.tsx"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# [build] は wrangler が src/index.tsx を直接バンドルするため不要
# デプロイ時は: wrangler deploy

[[d1_databases]]
binding = "MAL_DB"
database_name = "mal-search-db"
database_id = "2a731ee6-d1c7-4f51-8bcc-f15f993ad870"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "MAL_CACHE"
id = "91469fbf31a04241a54e0acdcb7b14c2"
preview_id = "91469fbf31a04241a54e0acdcb7b14c2"

[[r2_buckets]]
binding = "MAL_STORAGE"
bucket_name = "real-estate-files"

[vars]
ENVIRONMENT = "production"
APP_VERSION = "6.2.0"
MAX_RESULTS_PER_SITE = "15"
CACHE_TTL_SECONDS = "3600"
RATE_LIMIT_PER_MINUTE = "60"
# scheduled handler の self-call 用 (download-queue/process)。secret として ADMIN_SECRET を別途 wrangler secret put で設定する。
WORKER_URL = "https://mal-search-system.navigator-187.workers.dev"

[triggers]
crons = ["0 3 * * *", "0 9 * * *", "0 15 * * *", "0 21 * * *", "30 * * * *"]
